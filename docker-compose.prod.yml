services:
  app:
    image: ${APP_IMAGE:?set APP_IMAGE}
    container_name: fechapro-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}?schema=public
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      UPLOAD_DIR: /app/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - fechapro_uploads:/app/uploads
    restart: unless-stopped

  migrate:
    image: ${MIGRATOR_IMAGE:?set MIGRATOR_IMAGE}
    container_name: fechapro-migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}?schema=public
    profiles:
      - tools

  db:
    image: postgres:16-alpine
    container_name: fechapro-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?set POSTGRES_USER} -d ${POSTGRES_DB:?set POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - fechapro_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  fechapro_postgres_data:
  fechapro_uploads:
