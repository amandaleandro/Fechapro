services:
  db:
    image: postgres:16-alpine
    container_name: fechapro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fechapro}
      POSTGRES_USER: ${POSTGRES_USER:-fechapro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - fechapro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fechapro} -d ${POSTGRES_DB:-fechapro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: fechapro-app:local
    container_name: fechapro-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - fechapro_uploads:/app/uploads

volumes:
  fechapro_postgres_data:
  fechapro_uploads:
