services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fechapro-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fechapro:fechapro_dev_password@db:5432/fechapro?schema=public
      AUTH_SECRET: fechapro_local_secret_change_in_prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      MERCADO_PAGO_SANDBOX: ${MERCADO_PAGO_SANDBOX:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-FechaPro <noreply@fechapro.app>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:suporte@fechapro.com.br}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-development}
      HEALTHCHECK_TOKEN: ${HEALTHCHECK_TOKEN:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - fechapro_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"Authorization: Bearer $$HEALTHCHECK_TOKEN\" http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: fechapro-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fechapro:fechapro_dev_password@db:5432/fechapro?schema=public
    profiles:
      - tools

  db:
    image: postgres:16-alpine
    container_name: fechapro-db
    environment:
      POSTGRES_DB: fechapro
      POSTGRES_USER: fechapro
      POSTGRES_PASSWORD: fechapro_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fechapro -d fechapro"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5436:5432"
    volumes:
      - fechapro_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  fechapro_postgres_data:
  fechapro_uploads:
