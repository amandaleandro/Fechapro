name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and publish images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        run: |
          REPOSITORY_LC="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$REPOSITORY_LC" >> "$GITHUB_OUTPUT"
          echo "app_image=$REGISTRY/$REPOSITORY_LC:latest" >> "$GITHUB_OUTPUT"
          echo "migrator_image=$REGISTRY/$REPOSITORY_LC:migrator-latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata app
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.images.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Docker metadata migrator
        id: meta_migrator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.images.outputs.image_name }}
          tags: |
            type=raw,value=migrator-latest
            type=sha,prefix=migrator-sha-

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
            NEXT_PUBLIC_WHATSAPP_SUPPORT_MESSAGE=${{ secrets.NEXT_PUBLIC_WHATSAPP_SUPPORT_MESSAGE }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=${{ secrets.NEXT_PUBLIC_SENTRY_ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ steps.meta_migrator.outputs.tags }}
          labels: ${{ steps.meta_migrator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        run: |
          REPOSITORY_LC="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "app_image=$REGISTRY/$REPOSITORY_LC:latest" >> "$GITHUB_OUTPUT"
          echo "migrator_image=$REGISTRY/$REPOSITORY_LC:migrator-latest" >> "$GITHUB_OUTPUT"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.prod.yml,nginx"
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ steps.images.outputs.app_image }}
          MIGRATOR_IMAGE: ${{ steps.images.outputs.migrator_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: APP_IMAGE,MIGRATOR_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            APP_IMAGE="$APP_IMAGE" MIGRATOR_IMAGE="$MIGRATOR_IMAGE" docker compose --env-file .env.production -f docker-compose.prod.yml pull
            APP_IMAGE="$APP_IMAGE" MIGRATOR_IMAGE="$MIGRATOR_IMAGE" docker compose --env-file .env.production -f docker-compose.prod.yml --profile tools run --rm migrate
            APP_IMAGE="$APP_IMAGE" MIGRATOR_IMAGE="$MIGRATOR_IMAGE" docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
            docker exec fechapro-nginx nginx -s reload || true
            docker image prune -f
